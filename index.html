<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝗔𝗡𝗦𝗛 𝗠𝗔𝗙𝗜𝗔 🦅</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#020617,#000000);
    color: white;
    text-align: center;

    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}

/* PREMIUM BACKGROUND */
#bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
}

.bg-glow {
    position: fixed;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(0,224,255,0.18), transparent 70%);
    top: -200px;
    right: -150px;
    z-index: -1;
    filter: blur(40px);
}

.bg-glow2 {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(132,0,255,0.16), transparent 70%);
    bottom: -200px;
    left: -150px;
    z-index: -1;
    filter: blur(50px);
}

/* MAIN CONTAINER */
.container {
    width: 100%;
    max-width: 400px;
    transform: scale(1.05);
    transform-origin: top;

    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 28px;

    margin-top: 20px;
    padding: 20px;

    box-shadow:
    0 0 30px rgba(0,224,255,0.12),
    0 0 60px rgba(132,0,255,0.12);
}

/* LOGO */
.logo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin-top: 10px;
    border: 3px solid #00e0ff;
    box-shadow:
    0 0 20px #00e0ff,
    0 0 40px rgba(0,224,255,0.4);
}

/* Heading */
h1 {
    color: #00e0ff;
    text-shadow: 0 0 15px #00e0ff;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

/* DESCRIPTION */
.desc {
    max-width: 320px;
    margin: 5px auto;
    font-size: 14px;
    line-height: 1.6;
    color: #d8e2ff;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 15px 25px;
    border-radius: 30px;
    background: linear-gradient(90deg,#6a5cff,#b84cff);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;

    box-shadow:
    0 0 15px #6a5cff,
    0 0 35px rgba(106,92,255,0.4);

    transition: 0.3s ease;
}

.btn:hover {
    transform: scale(1.05);
}

/* Timer */
.timer-box {
    margin-top: 25px;
    margin-bottom: 0;
}

svg {
    width: 150px;
    height: 150px;
    transform: rotate(-90deg);
}

circle {
    fill: none;
    stroke-width: 10;
}

.bg {
    stroke: rgba(255,255,255,0.1);
}

.progress {
    stroke: #ff2d55;
    stroke-linecap: round;
    transition: 1s linear;
    filter: drop-shadow(0 0 12px #ff2d55);
}

.wrapper {
    position: relative;
    display: inline-block;
}

#time {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    color: #ff2d55;
    font-weight: bold;
    text-shadow: 0 0 15px #ff2d55;
}

/* Live users */
#liveUsers {
    color: #00e0ff;
    text-shadow: 0 0 10px #00e0ff;
    margin-top: 10px;
}

/* Spots */
#spotsLeft {
    color: #ff3b3b;
    font-weight: bold;
    margin-top: 5px;
    animation: blink 1s infinite alternate;
}

@keyframes blink {
    from {opacity: 0.6;}
    to {opacity: 1;}
}

/* POPUP */
.popup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(12,19,41,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px 18px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,224,255,0.25);
    font-size: 14px;
    display: none;
    backdrop-filter: blur(12px);
}
</style>
</head>

<body>

<!-- PREMIUM GLOW -->
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<!-- BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<div class="container">

<img src="Logo.png" class="logo">

<h1>𝗔𝗡𝗦𝗛 𝗠𝗔𝗙𝗜𝗔 🦅</h1>

<div class="desc">
📊 India's Most Trusted Prediction Channel<br>
🔥 Daily 100% Accurate Signals<br>
💰 Earn Money Easily From Home<br>
⚡ Limited Seats Available – Join Fast!
</div>

<h3 id="liveUsers">👥 1200 users online</h3>
<h3 id="spotsLeft">⚡ Only 12 spots left</h3>

<button class="btn" onclick="join()">Join Telegram Channel</button>

<div class="timer-box">
<h2>Free Joining Ends In</h2>

<div class="wrapper">
<svg>
<circle class="bg" cx="75" cy="75" r="70"></circle>
<circle class="progress" cx="75" cy="75" r="70"></circle>
</svg>
<div id="time">15</div>
</div>
</div>

</div>

<div class="popup" id="popup"></div>

<script>
/* PREMIUM PARTICLE BACKGROUND */
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        speedX: Math.random() * 0.6 - 0.3,
        speedY: Math.random() * 0.6 - 0.3
    });
}

function animateBG() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,224,255,0.8)";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#00e0ff";
        ctx.fill();

        for (let j = index + 1; j < particles.length; j++) {
            let dx = p.x - particles[j].x;
            let dy = p.y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 120) {
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,255,255,0.05)";
                ctx.lineWidth = 1;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    });

    requestAnimationFrame(animateBG);
}
animateBG();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

/* TIMER */
let total = 15;
let time = total;

const circle = document.querySelector(".progress");
const radius = 70;
const circumference = 2 * Math.PI * radius;

circle.style.strokeDasharray = circumference;
circle.style.strokeDashoffset = 0;

function updateCircle() {
    let offset = circumference - (time / total) * circumference;
    circle.style.strokeDashoffset = offset;
}

let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;
    updateCircle();

    if (time <= 0) {
        clearInterval(timer);
        window.location.href = "https://t.me/+e1VHnfKB5cI2NzRl";
    }
}, 1000);

/* LIVE USERS */
let count = 1000 + Math.random()*500;

setInterval(() => {
    let change = Math.random() < 0.2 ? Math.random()*50 : Math.random()*10;

    if (Math.random() > 0.4) count += change;
    else count -= change;

    if (count < 900) count = 950;
    if (count > 2000) count = 1800;

    document.getElementById("liveUsers").innerText =
    "👥 " + Math.floor(count) + " users online";
}, 1500);

/* SPOTS */
let spots = 12;

setInterval(() => {
    if (Math.random() < 0.6 && spots > 1) spots--;

    document.getElementById("spotsLeft").innerText =
    "⚡ Only " + spots + " spots left";
}, 3000);

/* POPUP */
const names = ["Rahul","Aman","Sohit","Neha","Pooja","Ravi","Ankit"];
const popup = document.getElementById("popup");

setInterval(() => {
    let name = names[Math.floor(Math.random()*names.length)];
    popup.innerText = name + " joined just now ✅";
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}, 4000);

/* BUTTON */
function join(){
    window.location.href = "https://t.me/+e1VHnfKB5cI2NzRl";
}
</script>

</body>
</html>
